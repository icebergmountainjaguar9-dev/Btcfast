<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boba Token Mining Simulator</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

header{
    background:linear-gradient(90deg,#7c3aed,#ec4899);
    padding:20px;
    font-size:2rem;
    font-weight:bold;
}

.wallet-box{
    margin:20px auto;
    max-width:500px;
}

input{
    width:90%;
    padding:12px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:14px 30px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#miner{
    display:none;
    margin-top:20px;
}

.progress{
    width:80%;
    height:30px;
    background:#333;
    margin:20px auto;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ec4899,#7c3aed);
}

.boba-area{
    font-size:60px;
    height:120px;
    margin-top:20px;
}

.status{
    font-size:22px;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
🧋 BOBA TOKEN POLYGON SIMULATOR
</header>

<div class="wallet-box">
<h2>Enter Your Polygon Address First</h2>

<input
id="wallet"
placeholder="Paste Polygon Wallet Address">

<br>

<button onclick="startMining()">
Start Boba Mining
</button>
</div>

<div id="miner">

<div class="boba-area" id="boba">
🧋
</div>

<div class="status" id="status">
Preparing ingredients...
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h2 id="earned">
0.000 BOBA
</h2>

</div>

<script>

const flavors = [
"🧋 Classic Milk Tea",
"🍓 Strawberry Boba",
"🥭 Mango Boba",
"🍵 Matcha Boba",
"🫐 Blueberry Boba",
"🍫 Chocolate Boba",
"🥥 Coconut Boba",
"🍯 Honey Boba"
];

let progress = 0;
let reward = 0;

function startMining(){

const wallet =
document.getElementById("wallet").value.trim();

if(wallet.length < 20){
alert("Please enter your Polygon address first.");
return;
}

document.getElementById("miner").style.display="block";

setInterval(()=>{

progress++;

if(progress > 100){
progress = 0;
}

document.getElementById("bar").style.width =
progress + "%";

const flavor =
flavors[Math.floor(Math.random()*flavors.length)];

document.getElementById("status").innerHTML =
"Making " + flavor;

document.getElementById("boba").innerHTML =
"🧋 🧋 🧋";

reward += Math.random()*0.15;

document.getElementById("earned").innerHTML =
reward.toFixed(3) + " BOBA";

},200);

}
</script>

</body>
</html>
