<section class="miner-container">
    <h1>Mine Dogecoin</h1>

    <p>
        Simulate Dogecoin mining and generate a successful mining result.
    </p>

    <div class="form-group">
        <label>Dogecoin Wallet Address</label>

        <input
            id="dogeAddress"
            type="text"
            placeholder="Dxxxxxxxxxxxxxxxxxxxx"
        />
    </div>

    <div class="form-group">
        <label>Mining Power</label>

        <select id="hashrate">
            <option>100 MH/s</option>
            <option>500 MH/s</option>
            <option>1 GH/s</option>
            <option>5 GH/s</option>
        </select>
    </div>

    <button id="startMining">
        Start Mining
    </button>
    <div class="mining-panel">

    <div class="progress-wrapper">
        <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="status" class="status">
        Ready to mine
    </div>

    <div id="balance">
        0.000000
    </div>

    <div id="miningLog" class="mining-log"></div>

</div>

    <div id="miningResult"></div>
</section>

<script src="js/dogecoin-miner.js"></script>
<script src="js/mining-engine.js"></script>

<button onclick="startMining('DOGE')">
    Start Mining
</button>

<button onclick="stopMining()">
    Stop Mining
</button>
