<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Mining Simulator</title>
    <link rel="stylesheet" href="solana.css">
</head>
<body>

<div class="container">

    <h1>Solana Mining Simulator</h1>

    <p>
        Simulate Solana reward generation for demonstration purposes.
    </p>

    <div class="card">

        <label>Solana Wallet Address</label>

        <input
            type="text"
            id="wallet"
            placeholder="Enter Solana wallet address"
        >

        <button id="mineBtn">
            Start Simulation
        </button>

        <div id="result"></div>

    </div>

    <a href="index.html" class="back-button">
        Back Home
    </a>

</div>

<script src="solana.js"></script>

</body>
</html>
