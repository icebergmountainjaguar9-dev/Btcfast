<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SushiToken Mining</title>
<link rel="stylesheet" href="sushitoken.css">
</head>
<body>

<div class="container">

    <div class="sushi-animation">
        <div class="sashimi">🍣</div>
        <div class="nori">🍙</div>
    </div>

    <h1>🍣 SushiToken Mining</h1>

    <div class="wallet-box">
        <label for="wallet">
            Enter Your SushiToken Polygon Address
        </label>

        <input
            type="text"
            id="wallet"
            placeholder="0x..."
        >
    </div>

    <button id="startMiningBtn">
        Start SushiToken Mining
    </button>

    <div id="status"></div>

</div>

<script src="sushitoken.js"></script>

</body>
</html>
