<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRX Miner</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:#101522;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    padding-top:80px;
}

.jaguar{
    font-size:40px;
    animation:growJaguar 4s infinite;
}

@keyframes growJaguar{
    0%{
        transform:scale(0.5);
    }
    50%{
        transform:scale(2);
    }
    100%{
        transform:scale(0.5);
    }
}

.mine-button{
    margin-top:40px;
    padding:20px 40px;
    border:none;
    border-radius:20px;
    font-size:22px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ TRX Mining Center</h1>

<div class="jaguar">🐆</div>

<p>TRX mining page loaded.</p>

<button class="mine-button" onclick="startMining()">
Start Mining
</button>

</div>

<script>
function startMining(){
    alert("TRX mining activated");
}
</script>

</body>
</html>
